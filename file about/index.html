<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family: 'Segoe UI', sans-serif;
}

body,html{
  height:100%;
  overflow:hidden;
}

/* ENTER PAGE */
#enterPage{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
}

/* glow button */
.enter-btn{
  padding:18px 60px;
  font-size:22px;
  border:none;
  border-radius:30px;
  color:white;
  cursor:pointer;
  background:linear-gradient(45deg,#00f0ff,#0077ff);
  box-shadow:0 0 20px #00f0ff,0 0 40px #0077ff;
  transition:0.3s;
}

.enter-btn:hover{
  transform:scale(1.1);
  box-shadow:0 0 60px #00f0ff;
}

/* MAIN */
#mainPage{
  display:none;
  height:100%;
}

/* VIDEO */
video{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
}

/* OVERLAY */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,20,0.6);
  backdrop-filter:blur(2px);
  z-index:-1;
}

/* CARD */
.container{
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
}

.card{
  width:320px;
  padding:25px;
  border-radius:25px;
  text-align:center;
  color:white;

  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(25px);

  box-shadow:
    0 0 20px rgba(0,255,255,0.4),
    0 0 60px rgba(0,150,255,0.3);
}

/* profile */
.card img{
  width:95px;
  height:95px;
  border-radius:50%;
  border:3px solid #00f0ff;
  box-shadow:0 0 25px #00f0ff;
  margin-bottom:10px;
}

/* text */
.card h2{
  font-size:28px;
  text-shadow:0 0 10px #00f0ff;
}

.card p{
  font-size:14px;
  opacity:0.85;
}

/* ICONS */
.icons{
  margin-top:20px;
}

.icons a{
  display:inline-flex;
  justify-content:center;
  align-items:center;

  width:55px;
  height:55px;
  margin:10px;

  border-radius:15px;
  font-size:24px;
  color:white;

  background:rgba(255,255,255,0.1);
  transition:0.3s;
}

.icons a:hover{
  transform:scale(1.2);
}

/* color glow */
.fb:hover{background:#1877f2; box-shadow:0 0 25px #1877f2;}
.wa:hover{background:#25d366; box-shadow:0 0 25px #25d366;}
.dc:hover{background:#5865f2; box-shadow:0 0 25px #5865f2;}
.tt:hover{background:#000; box-shadow:0 0 25px #ff0050;}

/* glow text */
.glow{
  position:absolute;
  width:100%;
  text-align:center;
  top:50%;
  transform:translateY(-50%);
  font-size:50px;
  color:white;
  opacity:0.05;
  letter-spacing:6px;
}
</style>
</head>

<body>

<!-- ENTER -->
